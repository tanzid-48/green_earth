<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Earth</title>
    <link rel="stylesheet" href="./style.css">

    <!-- tailwind and daisy UI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
    <main class="container mx-auto px-8">
        <h2 class="text-[#4ade80] font-semibold text-4xl text-center mb-8">Choose Your Trees</h2>

        <!-- Categories -->
        <div class=" grid grid-cols-12 gap-8 ">
            <div class=" col-span-3 bg-white card card-body shadow-2xl   ">
                <h2 class="font-bold text-2xl mb-4 ">Categories</h2>
                <button class="btn btn-primary1 w-full mb-4" id="all-trees-btn">All Trees</button>
                <div id="categories-container" class="space-y-4 sticky top-10">
                    <!-- categories came api -->
                </div>

            </div>

            <!-- Tree -->
            <div class="bg-white shadow-2xl col-span-6 p-6 rounded-2xl">

                <div class="grid grid-cols-1 sm:grid-cols-3 gap-4" id="trees-container">

                </div>

                <div id="loading-spinner" class="h-[60vh]   hidden justify-center items-center">

                    <span class="loading loading-bars loading-xs"></span>
                    <span class="loading loading-bars loading-sm"></span>
                    <span class="loading loading-bars loading-md"></span>
                    <span class="loading loading-bars loading-lg"></span>
                    <span class="loading loading-bars loading-xl"></span>
                </div>




            </div>


            <!-- Card -->
            <div class="bg-white  shadow-2xl col-span-3 p-6">Card</div>
        </div>

    </main>

    <script src="./script.js"></script>
</body>

</html>
